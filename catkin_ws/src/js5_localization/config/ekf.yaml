frequency: 30
two_d_mode: true
publish_tf: true
sensor_timeout: 0.5

map_frame: map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

# GPS (from navsat_transform_node)
odom0: /gps/odom
odom0_differential: false
odom0_config: [true, true, false,
               false, false, true,
               true,  true,  false,
               false, false, false,
               false, false, false]

# Velocity (from kc1400)
# Note: Bridged from TwistStamped to TwistWithCovarianceStamped by velocity_bridge.py
twist0: /kc1400/velocity_with_cov
twist0_differential: false
twist0_config: [false, false, false,
               false, false, false,
               true,  true,  false,
               false, false, false,
               false, false, false]

# IMU
imu0: /kc1400/imu
imu0_remove_gravitational_acceleration: true
imu0_config: [false, false, false,
              false, false, true,
              false, false, false,
              false, false, true,
              false, false, false]